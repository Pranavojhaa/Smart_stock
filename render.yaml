services:
  - type: web
    name: smartstock
    runtime: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt && PYTHONPATH=src python -m smartstock.pipeline
    startCommand: PYTHONPATH=src streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /
